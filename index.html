<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3M - TXT Generator 1.0</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #0f2027;
  overflow: hidden;
}

#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  width: 650px;
  margin: 120px auto;
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

#selectFolderBtn {
  background: #2d8cf0;
  color: white;
}

#generateBtn {
  background: #4caf50;
  color: white;
}

#applyColor {
  background: #9c27b0;
  color: white;
  margin-top: 10px;
}

#folderPath,
#fileSize {
  margin-top: 8px;
  font-size: 13px;
  opacity: 0.85;
  word-break: break-all;
}

.background-tools {
  margin-top: 25px;
}
</style>
</head>

<body>

<!-- Canvas pour thème Galactic -->
<canvas id="bgCanvas"></canvas>

<div class="container">

  <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
    <h1 id="title">TXT File Generator</h1>
    <button id="calcBtn" style="background: #43e97b; border: none; cursor: pointer; font-size: 32px; color: #222; margin-left: 12px; border-radius: 50%; width: 48px; height: 48px; box-shadow: 0 2px 8px rgba(67,233,123,0.25); display: flex; align-items: center; justify-content: center;">→</button>
  </div>

  <label id="maxLabel">Maximum number:</label>
  <input type="number" id="maxNumber" value="10000">

  <label id="fileLabel">File name:</label>
  <input type="text" id="fileName" value="numbers">


  <button id="selectFolderBtn">Select folder</button>
  <div id="folderPath"></div>

  <button id="generateBtn">Generate</button>
  <div id="fileSize"></div>

  <div class="background-tools">
    <!-- Color picker caché (ouvert via menu) -->
    <input type="color" id="colorPicker" style="display:none;">
  </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
